AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Wise Transfer API Demo on AWS ECS'

Parameters:
  ContainerImage:
    Type: String
    Description: Docker image URI
    Default: ''
  
  ContainerPort:
    Type: Number
    Default: 3000
    Description: Container port
  
  DesiredCount:
    Type: Number
    Default: 1
    Description: Number of tasks to run

Resources:
  # ECS Cluster
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: wise-transfer-cluster
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/wise-transfer-demo
      RetentionInDays: 7

  # ECS Task Role
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  # ECS Execution Role
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ECS Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: wise-transfer-demo
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: wise-transfer-demo
          Image: !Ref ContainerImage
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Ref ContainerPort
          # Secrets should be added via AWS Secrets Manager
          # Uncomment and configure:
          # Secrets:
          #   - Name: WISE_API_KEY
          #     ValueFrom: arn:aws:secretsmanager:REGION:ACCOUNT:secret:wise-api-key

  # VPC (using default VPC - customize as needed)
  # Security Group
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Wise Transfer API
      VpcId: !ImportValue DefaultVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: WiseTransferCluster
  
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
    Export:
      Name: WiseTransferTaskDefinition
  
  LogGroupName:
    Value: !Ref LogGroup
    Export:
      Name: WiseTransferLogGroup
